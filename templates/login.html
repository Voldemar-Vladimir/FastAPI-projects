<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для админов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5 shadow-lg border-0 rounded-4">
                    <h2 class="text-center mb-4">🔐 Вход для админов</h2>
                    <form action="/login" method="post">
                        <input type="password" name="pin" class="form-control form-control-lg mb-3" placeholder="Пароль" required>
                        <button class="btn btn-success w-100 rounded-pill">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
